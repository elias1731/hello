<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Jellyfin</title>
<style>
html,body{margin:0;height:100%;background:#000}
iframe{width:100%;height:100%;border:0}
</style>
</head>
<body>
<iframe id="jellyfin" src="https://jmusic.heyfordy.dev" allow="autoplay; fullscreen; picture-in-picture"></iframe>

<script>
const JELLY_URL = "https://jmusic.heyfordy.dev";

if ("mediaSession" in navigator) {
    navigator.mediaSession.setActionHandler("play", () => {
        document.getElementById("jellyfin").contentWindow?.postMessage({type:"play"}, JELLY_URL);
    });

    navigator.mediaSession.setActionHandler("pause", () => {
        document.getElementById("jellyfin").contentWindow?.postMessage({type:"pause"}, JELLY_URL);
    });

    navigator.mediaSession.setActionHandler("nexttrack", () => {
        document.getElementById("jellyfin").contentWindow?.postMessage({type:"next"}, JELLY_URL);
    });

    navigator.mediaSession.setActionHandler("previoustrack", () => {
        document.getElementById("jellyfin").contentWindow?.postMessage({type:"previous"}, JELLY_URL);
    });
}

window.addEventListener("message", e => {
    if (e.origin !== JELLY_URL) return;

    if (e.data?.type === "mediaMetadata" && navigator.mediaSession) {
        navigator.mediaSession.metadata = new MediaMetadata(e.data.metadata);
    }
});

if (typeof Windows !== "undefined") {
    try {
        const smtc = Windows.Media.SystemMediaTransportControls.getForCurrentView();
        smtc.isEnabled = true;
        smtc.isPlayEnabled = true;
        smtc.isPauseEnabled = true;
        smtc.isNextEnabled = true;
        smtc.isPreviousEnabled = true;
    } catch(e) {}
}
</script>
</body>
</html>
