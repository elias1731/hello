name: Build Sideloadable IPA from ZIP

on:
  push:
    paths:
      - 'fordyradio.zip'
      - 'fordyradio.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip package
        run: unzip fordyradio.zip

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install CocoaPods
        run: |
          cd src
          pod install --repo-update

      - name: Build App Project
        run: |
          # FIXED: Replaced CONFIGURATION_BUILD_DIR with derivedDataPath to avoid breaking CocoaPods module paths
          xcodebuild clean build \
            -workspace "src/FordyRadio.xcworkspace" \
            -scheme "FordyRadio" \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath "build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER="dev.heyfordy.radio"

      - name: Create IPA Package
        run: |
          mkdir -p Payload
          # FIXED: Updated path to match the Xcode derivedDataPath output structure
          cp -r build/Build/Products/Release-iphoneos/FordyRadio.app Payload/
          zip -r fordyradio.ipa Payload
          
      - name: Create Pre-Release
        uses: softprops/action-gh-release@v1
        with:
          files: fordyradio.ipa
          tag_name: fordyradio
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
