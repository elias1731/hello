<body>
    <header>
        <h1 class="rainbow-text">🧡 Puls</h1>
    </header>

    <main>
        <div class="container" id="ui">
            <div id="heart">🩶</div>
            <div id="status">Waiting for data</div>
        </div>
    </main>

    <script>
        async function update() {
            try {
                // Fetch live API (adjust URL to full domain if needed)
                const res = await fetch('https://api.heyfordy.dev/puls-elias/live'); 
                const data = await res.json();
                
                const ui = document.getElementById('ui');
                const heart = document.getElementById('heart');
                const status = document.getElementById('status');
                
                if (data.connected) {
                    ui.classList.add('connected');
                    heart.innerText = '❤️';
                    status.innerText = data.heartRate + ' BPM';
                    const speed = (60 / data.heartRate) + 's';
                    heart.style.setProperty('--pulse-speed', speed);
                } else {
                    ui.classList.remove('connected');
                    heart.innerText = '🩶';
                    status.innerText = 'Waiting for data';
                }
            } catch(e) {
                console.error("Fetch failed", e);
            }
        }
        setInterval(update, 5000);
        update();
    </script>
</body>
