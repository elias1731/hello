<body>
    <header>
        <h1 class="rainbow-text">🧡 Puls</h1>
    </header>

    <main>
        <div class="container" id="ui">
            <div class="stats-grid">
                <div class="stat-card">
                    <div id="heart">🩶</div>
                    <div id="status">Waiting for data</div>
                    <div class="label">Puls</div>
                </div>

                <div class="stat-card">
                    <div class="value" id="speed">0.0</div>
                    <div class="label">km/h</div>
                </div>

                <div class="stat-card">
                    <div class="value" id="distance">0.00</div>
                    <div class="label">km</div>
                </div>
            </div>

            <div class="controls">
                <button id="btn-start" onclick="startTracking()">Start</button>
                <button id="btn-pause" onclick="pauseTracking()" disabled>Pause</button>
                <button id="btn-stop" onclick="stopTracking()" disabled>Stop</button>
            </div>
        </div>
    </main>

    <script>
        let wakeLock = null;
        let watchId = null;
        let lastCoord = null;
        let totalDistance = 0;
        let trackingState = 'idle';

        // Fetch live heart rate data from API
        async function update() {
            try {
                const res = await fetch('https://api.heyfordy.dev/puls-elias/live'); 
                const data = await res.json();
                
                const ui = document.getElementById('ui');
                const heart = document.getElementById('heart');
                const status = document.getElementById('status');
                
                if (data.connected) {
                    ui.classList.add('connected');
                    heart.innerText = '❤️';
                    status.innerText = data.heartRate + ' BPM';
                    const speed = (60 / data.heartRate) + 's';
                    heart.style.setProperty('--pulse-speed', speed);
                } else {
                    ui.classList.remove('connected');
                    heart.innerText = '🩶';
                    status.innerText = 'Waiting for data';
                }
            } catch(e) {
                console.error("Fetch failed", e);
            }
        }

        // Request screen wake lock to keep display active
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.error("Wake lock failed", err);
                }
            }
        }

        // Release screen wake lock
        function releaseWakeLock() {
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        // Re-acquire wake lock if application visibility changes
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        // Calculate distance using haversine formula
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // Update disabled states of tracking interface buttons
        function updateButtons() {
            document.getElementById('btn-start').disabled = trackingState === 'running';
            document.getElementById('btn-pause').disabled = trackingState !== 'running';
            document.getElementById('btn-stop').disabled = trackingState === 'idle';
        }

        // Begin geolocation tracking and enable wake lock
        async function startTracking() {
            if (trackingState === 'idle') {
                totalDistance = 0;
                document.getElementById('distance').innerText = '0.00';
            }
            trackingState = 'running';
            updateButtons();
            await requestWakeLock();
            lastCoord = null;

            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(position => {
                    if (trackingState !== 'running') return;
                    
                    const speedMps = position.coords.speed || 0;
                    document.getElementById('speed').innerText = (speedMps * 3.6).toFixed(1);

                    if (lastCoord) {
                        const d = getDistance(lastCoord.latitude, lastCoord.longitude, position.coords.latitude, position.coords.longitude);
                        if (position.coords.accuracy < 30) {
                            totalDistance += d;
                        }
                    }
                    lastCoord = { latitude: position.coords.latitude, longitude: position.coords.longitude };
                    document.getElementById('distance').innerText = (totalDistance / 1000).toFixed(2);
                }, err => console.error(err), { enableHighAccuracy: true });
            }
        }

        // Pause current tracking operation
        function pauseTracking() {
            trackingState = 'paused';
            updateButtons();
            releaseWakeLock();
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            lastCoord = null;
            document.getElementById('speed').innerText = '0.0';
        }

        // Terminate tracking operation and reset state
        function stopTracking() {
            trackingState = 'idle';
            updateButtons();
            releaseWakeLock();
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            lastCoord = null;
            document.getElementById('speed').innerText = '0.0';
        }

        setInterval(update, 5000);
        update();
    </script>
</body>
