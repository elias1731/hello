<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="./assets/favicon.png">

    <script src="assets/splash.js" defer></script>
    <script>navigator.serviceWorker.register("./sw.js")</script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spritpreise 🇱🇺</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Spritpreise 🇱🇺">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="apple-touch-icon" href="./assets/app.png">
    
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="assets/style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-main">
                <h1>🇱🇺 Spritpreise </h1>
            <div class="status-badge" id="statusBadge">
                <span class="status-dot loading"></span>
                <span id="statusText">lädt...</span>
            </div>
            <div class="date-container">
                <p>Stand: <span id="priceDate">--.--.----</span></p>
            </div>
        </header>

        <main>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('fuel')">Kraftstoff</button>
                <button class="tab-btn" onclick="switchTab('heating')">Heizen</button>
            </div>

            <div class="price-grid" id="priceGrid">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </main>

        <footer>
            <p>Datenquelle: RTL.lu &bull; heyFordy.dev</p>
            <button class="refresh-btn" onclick="fetchPrices()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                Aktualisieren
            </button>
        </footer>
    </div>

    <script>
        const fuelMapping = {
            "95oct": { label: "Super 95 (E10)", type: "fuel", unit: "€/L", icon: "⛽" },
            "98oct": { label: "Super 98 (E5)", type: "fuel", unit: "€/L", icon: "⚡" },
            "diesel": { label: "Diesel", type: "fuel", unit: "€/L", icon: "🚙" },
            "lpg_carburant": { label: "Autogas (LPG)", type: "fuel", unit: "€/L", icon: "🌱" },
            "erdgascng": { label: "Erdgas (CNG)", type: "fuel", unit: "€/kg", icon: "🍃" },
            "mazout": { label: "Heizöl (Mazout)", type: "heating", unit: "€/L", icon: "🔥" },
            "mazout10ppm": { label: "Heizöl 10ppm", type: "heating", unit: "€/L", icon: "💧" },
            "propane_vrac": { label: "Propan (lose)", type: "heating", unit: "€/kg", icon: "💨" },
            "propane_bouteille": { label: "Propan (Flasche)", type: "heating", unit: "€/Fl.", icon: "🧴" },
            "butane_bouteille": { label: "Butan (Flasche)", type: "heating", unit: "€/Fl.", icon: "🛢️" }
        };

        let currentData = null;
        let currentTab = 'fuel';

        async function fetchPrices() {
            const statusDot = document.querySelector('.status-dot');
            const statusText = document.getElementById('statusText');
            
            statusDot.className = 'status-dot loading';
            statusText.innerText = 'lädt...';

            try {
                const response = await fetch('https://api.heyfordy.dev/spritpreise');
                if (!response.ok) throw new Error('Network response error');
                
                const data = await response.json();
                renderData(data, !navigator.onLine);
            } catch (error) {
                statusDot.className = 'status-dot offline';
                statusText.innerText = '⚠️ Fehler!';
                document.getElementById('priceDate').innerText = '--.--.----';
                document.getElementById('priceGrid').innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-muted); font-weight:500;">Keine Daten verfügbar.<br><br>Bitte überprüfe deine Internetverbindung.</div>';
            }
        }

        function renderData(data, isOffline) {
            currentData = data;
            
            const dateObj = new Date(data.date);
            const formattedDate = dateObj.toLocaleDateString('de-DE', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });
            document.getElementById('priceDate').innerText = formattedDate;

            const statusDot = document.querySelector('.status-dot');
            const statusText = document.getElementById('statusText');
            if (isOffline) {
                statusDot.className = 'status-dot offline';
                statusText.innerText = 'Offline-Daten';
            } else {
                statusDot.className = 'status-dot online';
                statusText.innerText = 'Daten aktuell';
            }

            filterAndRenderCards();
        }

        function filterAndRenderCards() {
            if (!currentData) return;
            
            const grid = document.getElementById('priceGrid');
            grid.innerHTML = '';

            Object.keys(fuelMapping).forEach(key => {
                const config = fuelMapping[key];
                
                if (config.type !== currentTab) return;

                const price = currentData[key];
                if (price === undefined || price === null) return;

                const card = document.createElement('div');
                card.className = `price-card ${config.type}`;
                
                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-icon">${config.icon}</span>
                        <span class="card-title">${config.label}</span>
                    </div>
                    <div class="card-body">
                        <span class="price-value">${price.toFixed(3)}</span>
                        <span class="price-unit">${config.unit}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function switchTab(tabName) {
            currentTab = tabName;
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            const event = window.event;
            if(event && event.target) {
                event.target.classList.add('active');
            } else {
                const buttons = document.querySelectorAll('.tab-btn');
                if(tabName === 'fuel') buttons[0].classList.add('active');
                if(tabName === 'heating') buttons[1].classList.add('active');
            }

            filterAndRenderCards();
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }

        window.addEventListener('DOMContentLoaded', fetchPrices);
    </script>
</body>
</html>
